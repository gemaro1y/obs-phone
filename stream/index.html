<!DOCTYPE html>
<!-- gemaro1y -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PhoneStream OBS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    img { width: 100%; height: 100%; object-fit: contain; display: block; }
    #status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #666; font: 16px sans-serif; text-align: center;
    }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">Ожидание камеры с телефона...</div>
  <img id="stream" style="display:none" />

  <script>
    const img = document.getElementById('stream');
    const status = document.getElementById('status');
    let reconnectTimer = null;

    function connect() {
      // Clear previous
      if (reconnectTimer) clearTimeout(reconnectTimer);
      img.src = '';

      // Fetch MJPEG stream
      img.onload = () => {
        status.classList.add('hidden');
        img.style.display = 'block';
      };
      img.onerror = () => {
        status.classList.remove('hidden');
        img.style.display = 'none';
        status.textContent = 'Ожидание камеры с телефона...';
        reconnectTimer = setTimeout(connect, 2000);
      };

      img.src = '/mjpeg?t=' + Date.now();
    }

    connect();
  </script>
</body>
</html>
