<!DOCTYPE html>
<!-- gemaro1y -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PhoneStream OBS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    img { width: 100%; height: 100%; object-fit: contain; display: none; }
    #status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #666; font: 16px sans-serif; text-align: center;
    }
  </style>
</head>
<body>
  <div id="status">Ожидание камеры...</div>
  <img id="stream" />
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const img = document.getElementById('stream');
    const status = document.getElementById('status');
    const socket = io();

    socket.on('connect', () => { socket.emit('join', 'desktop'); });

    socket.on('phone-status', (data) => {
      if (data.connected) {
        img.src = '/mjpeg?' + Date.now();
        img.style.display = 'block';
        status.style.display = 'none';
      } else {
        img.style.display = 'none';
        status.style.display = 'block';
        status.textContent = 'Ожидание камеры...';
      }
    });

    img.onerror = () => {
      setTimeout(() => {
        if (img.style.display === 'block') {
          img.src = '/mjpeg?' + Date.now();
        }
      }, 2000);
    };
  </script>
</body>
</html>
