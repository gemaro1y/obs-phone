<!DOCTYPE html>
<!-- gemaro1y -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PhoneStream OBS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; display: block; }
    #status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #666; font: 16px sans-serif; text-align: center;
    }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">Ожидание камеры с телефона...</div>
  <video id="stream" autoplay playsinline></video>

  <script>
    const video = document.getElementById('stream');
    const status = document.getElementById('status');
    let reconnectTimer = null;
    let loading = false;

    function connect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      if (loading) return;
      loading = true;
      video.src = '';

      video.onloadeddata = () => {
        loading = false;
        status.classList.add('hidden');
        video.style.display = 'block';
      };

      video.onerror = () => {
        loading = false;
        status.classList.remove('hidden');
        video.style.display = 'none';
        status.textContent = 'Ожидание камеры...';
        reconnectTimer = setTimeout(connect, 1500);
      };

      video.src = '/video?t=' + Date.now();
    }

    window.addEventListener('load', connect);

    setInterval(() => {
      if (video.readyState >= 2) {
        status.classList.add('hidden');
        video.style.display = 'block';
      }
    }, 2000);
  </script>
</body>
</html>
