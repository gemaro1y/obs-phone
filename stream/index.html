<!DOCTYPE html>
<!-- gemaro1y -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PhoneStream OBS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    img { width: 100%; height: 100%; object-fit: contain; display: block; }
    #status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #666; font: 16px sans-serif; text-align: center;
    }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">Ожидание камеры с телефона...</div>
  <img id="stream" style="display:none" />

  <script>
    const img = document.getElementById('stream');
    const status = document.getElementById('status');
    let reconnectTimer = null;
    let loading = false;

    function connect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      if (loading) return;
      loading = true;
      img.src = '';

      img.onload = () => {
        loading = false;
        status.classList.add('hidden');
        img.style.display = 'block';
      };

      img.onerror = () => {
        loading = false;
        status.classList.remove('hidden');
        img.style.display = 'none';
        status.textContent = 'Ожидание камеры...';
        reconnectTimer = setTimeout(connect, 1500);
      };

      img.src = '/mjpeg?t=' + Date.now();
    }

    window.addEventListener('load', connect);

    let lastFrameTime = 0;
    setInterval(() => {
      if (img.style.display === 'block' && Date.now() - lastFrameTime > 5000) {
        connect();
      }
    }, 3000);

    img.addEventListener('load', () => { lastFrameTime = Date.now(); });
  </script>
</body>
</html>
